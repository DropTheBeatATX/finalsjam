<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b12">
<title>Finals Jam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Oswald:wght@500;700&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --court:#0b0b12; --panel:#15131d; --panel2:#1d1a28; --line:#352f45;
  --flame:#ff6a1a; --hot:#e01e1e; --volt:#ffc400; --cyan:#19e0ff; --gold:#ffd23f;
  --ink:#f6f3ea; --mut:#9b93ad; --mut2:#6f6883;
  --disp:'Bungee','Arial Black',Impact,sans-serif;
  --body:'Oswald','Arial Narrow',sans-serif;
  --led:'VT323',ui-monospace,'Courier New',monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{
  background:
    radial-gradient(120% 60% at 50% -10%, rgba(255,106,26,.28), transparent 60%),
    radial-gradient(80% 40% at 50% 0%, rgba(224,30,30,.22), transparent 55%),
    var(--court);
  color:var(--ink); font-family:var(--body);
  min-height:100vh; padding:calc(env(safe-area-inset-top) + 38px) 14px 120px; line-height:1.25; background-attachment:fixed;
}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px);
  mix-blend-mode:multiply;opacity:.5}
.wrap{max-width:760px;margin:0 auto}
.hdr{text-align:center;margin:6px 0 18px}
.title{font-family:var(--disp);font-size:clamp(40px,13vw,82px);line-height:.92;letter-spacing:1px;margin:0;
  color:#fff4e6;-webkit-text-stroke:2px var(--flame);
  text-shadow:-4px -4px 0 #1a0a04, 4px -4px 0 #1a0a04, -4px 4px 0 #1a0a04, 4px 4px 0 #1a0a04,
    0 -4px 0 #1a0a04, 0 4px 0 #1a0a04, -4px 0 0 #1a0a04, 4px 0 0 #1a0a04, 0 9px 14px rgba(0,0,0,.45);}
.tag{font-family:var(--body);font-weight:700;text-transform:uppercase;letter-spacing:.16em;font-size:12px;color:var(--volt);margin-top:14px}
.score{display:flex;gap:8px;justify-content:center;margin:18px 0 6px;flex-wrap:wrap}
.stat{background:#08070c;border:2px solid var(--line);border-radius:8px;padding:8px 14px;min-width:92px;text-align:center;box-shadow:inset 0 0 12px rgba(0,0,0,.7)}
.stat .num{font-family:var(--disp);font-size:22px;color:var(--volt);text-shadow:0 0 10px rgba(255,196,0,.45);letter-spacing:1px}
.stat .num small{font-size:12px;color:var(--mut)}
.stat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--mut);font-weight:700;margin-top:3px}
.stat.fire .num{color:var(--flame);text-shadow:0 0 12px rgba(255,106,26,.6)}
.stat.gold .num{color:var(--gold);text-shadow:0 0 12px rgba(255,210,63,.6)}
.controls{margin:18px 0 6px}
.decs{display:flex;gap:6px}
.decs button{flex:1 1 0;min-width:0;background:#100e16;border:2px solid var(--line);color:var(--mut);
  font-family:var(--body);font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:12px;padding:9px 2px;border-radius:7px;cursor:pointer}
.decs button.on{border-color:var(--flame);color:#fff;background:linear-gradient(180deg,var(--flame),var(--hot));box-shadow:0 0 14px rgba(255,106,26,.5)}
.search{width:100%;margin-top:10px;background:#08070c;border:2px solid var(--line);border-radius:7px;color:var(--ink);font-family:var(--body);font-size:15px;padding:11px 12px;outline:none}
.search:focus{border-color:var(--cyan);box-shadow:0 0 12px rgba(25,224,255,.3)}
.search::placeholder{color:var(--mut2)}
.sec{font-family:var(--disp);font-size:14px;letter-spacing:1px;color:var(--cyan);text-shadow:0 0 12px rgba(25,224,255,.4);margin:26px 2px 12px;text-transform:uppercase}
.badge{display:inline-flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:13px;min-width:46px;height:28px;padding:0 9px;border-radius:6px;letter-spacing:1px;border:1.5px solid rgba(0,0,0,.45);flex-shrink:0;line-height:1}
.badge.sm{font-size:10px;min-width:36px;height:21px;padding:0 6px;border-radius:5px;letter-spacing:.5px}
.badge.big{font-size:16px;min-width:60px;height:40px}
.logo{height:46px;min-width:46px;border-radius:10px;background:rgba(255,255,255,.96);display:inline-flex;align-items:center;justify-content:center;padding:5px;flex-shrink:0;border:1.5px solid rgba(0,0,0,.3);box-shadow:0 2px 10px rgba(0,0,0,.45)}
.logo img{max-width:120px;max-height:100%;display:block}
.logo.sm{height:26px;min-width:26px;border-radius:6px;padding:3px;box-shadow:none}
.logo.sm img{max-width:64px}
.logo.big{height:70px;min-width:70px;border-radius:14px;padding:8px}
.logo.big img{max-width:160px}
.card{position:relative;margin-bottom:18px}
.chead{position:relative;display:block;cursor:pointer;border:3px solid transparent;border-radius:18px;padding:0;overflow:hidden;
  background:linear-gradient(#0f0d16,#0b0910) padding-box, linear-gradient(140deg,var(--c1,#444),rgba(255,255,255,.55) 50%,var(--c2,#222)) border-box;
  box-shadow:0 10px 26px rgba(0,0,0,.5)}
.card.open .chead{border-bottom-left-radius:0;border-bottom-right-radius:0}
.card.done .chead{background:linear-gradient(#0f0d16,#0b0910) padding-box, linear-gradient(140deg,#e8c14a,rgba(255,255,255,.6) 50%,#8a6614) border-box;
  box-shadow:0 10px 26px rgba(0,0,0,.5), 0 0 22px rgba(255,210,63,.25)}
.tnum{position:absolute;top:11px;right:13px;z-index:4;font-family:var(--disp);font-size:10px;letter-spacing:1px;
  color:rgba(255,255,255,.92);background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:3px 9px}
.tphoto{position:relative;display:flex;align-items:center;justify-content:space-between;gap:9px;min-height:132px;padding:16px 13px;overflow:hidden;
  background:radial-gradient(120% 90% at 50% -10%,rgba(255,255,255,.22),transparent 55%), linear-gradient(140deg,var(--c1,#444),var(--c2,#222))}
.tphoto.champ{background:radial-gradient(120% 90% at 50% -10%,rgba(255,255,255,.3),transparent 55%), linear-gradient(140deg,#e8c14a,#8a6614)}
.tphoto .holo{position:absolute;inset:0;pointer-events:none;mix-blend-mode:overlay;opacity:.5;
  background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.5) 45%,rgba(255,255,255,0) 60%),
    repeating-linear-gradient(115deg,rgba(255,0,128,.10) 0 8px,rgba(0,200,255,.10) 8px 16px,rgba(255,220,0,.10) 16px 24px)}
.tphoto .logo{height:58px;min-width:58px;border-radius:13px;box-shadow:0 4px 14px rgba(0,0,0,.5)}
.tphoto .logo img{max-width:150px}
.tphoto .logo.big{height:84px;min-width:84px}
.tphoto .logo.big img{max-width:200px}
.tvs{font-family:var(--disp);font-size:17px;color:#fff;letter-spacing:1px;text-shadow:0 2px 6px rgba(0,0,0,.65)}
.tmatch{display:flex;align-items:center;gap:9px;min-width:0;flex-shrink:0}
.tsc{flex:0 1 auto;min-width:0;max-width:50%;text-align:right;background:rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:6px 8px}
.tsc .mvpsprite{flex-shrink:0;image-rendering:pixelated;filter:drop-shadow(0 1px 2px rgba(0,0,0,.55))}
.mvpsprite.tG{width:30px;height:30px}
.mvpsprite.tF{width:37px;height:37px}
.mvpsprite.tC{width:44px;height:44px}
.tscbody{flex:1;min-width:0}
.tsc .lbl{font-family:var(--body);font-weight:700;font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.7);line-height:1.2;white-space:nowrap;text-align:right}
.tsc .nm{font-family:var(--body);font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.02em;margin-top:3px;line-height:1.15;white-space:nowrap;text-align:right}
.tsc .mvpstats{display:flex;flex-wrap:nowrap;justify-content:flex-end;gap:4px;margin-top:5px}
.tsc .st{text-align:center;line-height:1}
.tsc .st b{display:block;font-family:var(--disp);font-size:9px;color:var(--volt);text-shadow:0 1px 4px rgba(0,0,0,.5)}
.tsc .st i{font-style:normal;font-size:6px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.66);text-transform:uppercase}
.crown{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-family:var(--disp);font-size:11px;letter-spacing:3px;color:#3a2a06;text-shadow:0 1px 0 rgba(255,255,255,.4)}
.tplate{text-align:center;padding:13px 14px 4px}
.tkicker{font-family:var(--body);font-weight:700;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--mut)}
.tyear{font-family:var(--disp);font-size:34px;line-height:1;color:var(--ink);letter-spacing:1px;margin-top:7px}
.tyear.champ{font-size:22px;color:var(--gold);text-shadow:0 0 16px rgba(255,210,63,.4)}
.tnames{font-family:var(--body);font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tnames b{color:var(--volt)}
.tfoot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 16px 12px}
.meter{display:flex;gap:5px}
.pip{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22)}
.pip.lit{background:radial-gradient(circle at 50% 35%,#fff,var(--volt) 55%,var(--flame));border-color:var(--volt);box-shadow:0 0 8px rgba(255,196,0,.7)}
.tstatus{font-family:var(--body);font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut2)}
.tstatus.champ{color:#3a2a06;background:linear-gradient(180deg,var(--volt),var(--gold));padding:4px 11px;border-radius:20px;letter-spacing:.1em}
.thint{text-align:center;font-family:var(--body);font-weight:700;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut2);padding:0 0 11px}
.games{display:none;border:3px solid transparent;border-top:none;border-radius:0 0 16px 16px;margin:0 2px;padding:12px 13px 14px;
  background:linear-gradient(#0c0a12,#0c0a12) padding-box, linear-gradient(140deg,var(--c1,#444),var(--c2,#222)) border-box}
.card.done .games{background:linear-gradient(#0c0a12,#0c0a12) padding-box, linear-gradient(140deg,#e8c14a,#8a6614) border-box}
.card.open .games{display:block}
.gltitle{font-family:var(--body);font-weight:700;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--mut);margin:2px 2px 9px}
.recapbtn{display:block;width:100%;margin:0 0 10px;background:transparent;border:2px solid var(--gold);color:var(--gold);font-family:var(--body);font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:11px;border-radius:10px;cursor:pointer}
.game{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:9px 11px;margin-top:7px;cursor:pointer}
.game.on{background:rgba(255,196,0,.08);border-color:rgba(255,196,0,.35)}
.gtok{flex-shrink:0;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--mut2);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14)}
.game.on .gtok{color:#2a1e04;background:linear-gradient(180deg,var(--volt),var(--flame));border-color:var(--volt);box-shadow:0 0 10px rgba(255,196,0,.5)}
.gbody{flex:1;min-width:0}
.ghead{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.gnum{font-family:var(--disp);font-size:11px;color:var(--cyan);letter-spacing:.5px}
.game.on .gnum{color:var(--volt)}
.gdate{font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.line{display:flex;align-items:center;gap:8px;padding:2px 0}
.line .tm{flex:1;font-size:13px;font-weight:500;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc{font-family:var(--disp);font-size:16px;color:var(--mut2);flex-shrink:0;min-width:28px;text-align:right}
.line.win .tm{color:var(--ink);font-weight:700}
.line.win .sc{color:var(--volt)}
.trophies{display:flex;flex-wrap:wrap;gap:9px}
.tro{background:linear-gradient(180deg,#241d08,#15110a);border:2px solid var(--gold);border-radius:9px;padding:9px 12px;min-width:120px;box-shadow:0 0 14px rgba(255,210,63,.22);display:flex;align-items:center;gap:9px}
.tro .ty{font-family:var(--disp);font-size:19px;color:var(--gold);letter-spacing:1px;text-shadow:0 0 10px rgba(255,210,63,.5)}
.tro .tc{font-size:11px;color:var(--ink);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-top:2px}
.empty{color:var(--mut2);font-size:13px;padding:4px 2px;line-height:1.5}
.data{display:flex;gap:10px;justify-content:center;margin-top:30px;flex-wrap:wrap}
.data button{background:transparent;border:2px solid var(--line);color:var(--mut);font-family:var(--body);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:9px 16px;border-radius:7px;cursor:pointer}
.data button:hover{border-color:var(--cyan);color:var(--cyan)}
.dmsg{text-align:center;color:var(--volt);font-weight:700;font-size:13px;letter-spacing:.04em;margin-top:12px;text-transform:uppercase}
.reset{text-align:center;margin-top:18px}
.reset button{background:transparent;border:none;color:var(--mut2);font-family:var(--body);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:underline}
.reset button.arm{color:var(--flame)}
.reset button.dang{color:#ff5a5a}
.cel{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:18px;background:radial-gradient(circle at 50% 40%,rgba(255,106,26,.32),rgba(0,0,0,.88));overflow:hidden}
.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.cfx{position:absolute;top:-20px;width:9px;height:9px;border-radius:1px;animation:fall linear infinite}
@keyframes fall{0%{transform:translateY(-20px) rotate(0)}100%{transform:translateY(105vh) rotate(540deg)}}
.celbox{position:relative;background:linear-gradient(180deg,var(--panel2),#0c0a12);border:2px solid var(--gold);border-radius:16px;padding:26px 22px;max-width:440px;width:100%;box-shadow:0 0 50px rgba(255,210,63,.45);max-height:88vh;overflow-y:auto}
.champword{font-family:var(--disp);font-size:clamp(28px,9vw,46px);text-align:center;line-height:.95;
  background:linear-gradient(180deg,#fff,var(--volt) 45%,var(--flame));-webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 24px rgba(255,106,26,.6);-webkit-text-stroke:1.5px #1a0a04;animation:stamp .45s cubic-bezier(.2,1.4,.4,1) both}
.champword.small{font-family:var(--disp);font-size:16px;letter-spacing:1px;text-transform:uppercase;background:none;-webkit-text-fill-color:var(--cyan);color:var(--cyan);-webkit-text-stroke:0;text-shadow:0 0 12px rgba(25,224,255,.4);animation:none}
@keyframes stamp{0%{transform:scale(2.4) rotate(-6deg);opacity:0}60%{transform:scale(.92) rotate(1deg);opacity:1}100%{transform:scale(1) rotate(0)}}
.boomtag{font-family:var(--disp);font-size:12px;color:var(--flame);text-align:center;margin-top:12px;letter-spacing:1px;text-transform:uppercase;animation:blink 1s steps(2) infinite}
@keyframes blink{50%{opacity:.4}}
.rhead{display:flex;align-items:center;gap:14px;margin:18px 0 14px;padding-top:16px;border-top:1px solid var(--line)}
.celyr{font-family:var(--led);font-size:40px;line-height:.8;color:var(--gold);text-shadow:0 0 12px rgba(255,210,63,.8), 0 0 22px rgba(255,160,30,.5)}
.celc{font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;margin-top:4px}
.cels{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-top:5px}
.cels b{color:var(--flame)}
.rmvp{background:#08070c;border:2px solid var(--gold);border-radius:9px;padding:11px 13px;margin-bottom:14px;box-shadow:0 0 14px rgba(255,210,63,.2)}
.rmvp .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--gold);font-weight:700}
.rmvp .nm{font-family:var(--disp);font-size:18px;color:var(--ink);margin-top:5px;letter-spacing:.5px}
.rstats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.rstat{flex:1 1 calc(50% - 8px);background:#100e16;border:2px solid var(--line);border-radius:8px;padding:9px 11px}
.rstat .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--mut);font-weight:700}
.rstat .v{font-family:var(--disp);font-size:16px;color:var(--volt);margin-top:5px;letter-spacing:.5px}
.rstat .v small{font-family:var(--body);font-size:11px;color:var(--mut);font-weight:700}
.rlog .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--cyan);font-weight:700;margin-bottom:7px}
.glog{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--line);font-size:13px}
.glog .gg{font-family:var(--disp);font-size:11px;color:var(--mut2);width:34px;flex-shrink:0;letter-spacing:.5px}
.glog .gt{flex:1;color:var(--mut)}
.glog .gt b{color:var(--ink)}
.glog .gv{font-family:var(--led);font-size:17px;color:var(--volt);flex-shrink:0;letter-spacing:.5px;text-shadow:0 0 6px rgba(255,196,0,.4)}
.celbtn{display:block;width:100%;margin-top:18px;font-family:var(--disp);font-size:13px;letter-spacing:1px;color:#1a0a04;background:linear-gradient(180deg,var(--volt),var(--flame));border:none;border-radius:9px;padding:13px;cursor:pointer;text-transform:uppercase}
@media (prefers-reduced-motion:reduce){.game.on .ball{animation:none}.champword{animation:none}.boomtag{animation:none}.cfx{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1 class="title">Finals<br>Jam</h1>
    <div class="tag">Every NBA Finals since 1990</div>
    <div class="score" id="score"></div>
  </div>
  <div class="controls">
    <div class="decs" id="decs"></div>
    <input class="search" id="search" placeholder="Filter by team" oninput="onSearch(this.value)">
  </div>
  <div id="list"></div>
  <div class="sec">Trophy Case</div>
  <div id="case"></div>
  <div class="data">
    <button onclick="doExport()">Export</button>
    <button onclick="document.getElementById('imp').click()">Import</button>
    <input id="imp" type="file" accept="application/json,.json" style="display:none" onchange="onImport(event)">
  </div>
  <div class="dmsg" id="dmsg"></div>
  <div class="reset"><button id="clr" onclick="onClear()">Clear everything</button></div>
</div>

let state=load();
let expanded={}, decade="all", query="", clearStep=0, clearTimer=null;

function load(){try{const v=localStorage.getItem(KEY);if(v){const o=JSON.parse(v);return {watched:o.watched||{}};}}catch(e){}return {watched:{}};}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function gid(y,n){return y+"-"+n;}
function isOn(y,n){return !!state.watched[gid(y,n)];}
function finalsDone(f){return f.g.every(x=>isOn(f.y,x.n));}
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function badge(team,cls){
  const t=TEAM[team]||{ab:team.slice(0,3).toUpperCase(),bg:"#2a2738",fg:"#fff",ac:"#555"};
  const c=cls||"";
  if(t.lg){return `<span class="logo ${c}"><img src="${t.lg}" alt="${esc(team)}" loading="lazy"></span>`;}
  return `<span class="badge ${c}" style="background:${t.bg};color:${t.fg};box-shadow:3px 3px 0 ${t.ac}">${t.ab}</span>`;
}

function totals(){
  let tg=0,wg=0,done=0;
  FINALS.forEach(f=>{tg+=f.g.length; f.g.forEach(x=>{if(isOn(f.y,x.n))wg++;}); if(finalsDone(f))done++;});
  return {tg,wg,done};
}
function renderScore(){
  const t=totals();
  document.getElementById("score").innerHTML=
    `<div class="stat fire"><div class="num">${t.wg}</div><div class="lbl">Seen</div></div>`+
    `<div class="stat"><div class="num">${t.tg}</div><div class="lbl">Games</div></div>`+
    `<div class="stat gold"><div class="num">${t.done}<small>/${FINALS.length}</small></div><div class="lbl">Titles</div></div>`;
}
function renderDecs(){
  const ds=[["all","ALL"],["2020","20s"],["2010","10s"],["2000","00s"],["1990","90s"]];
  document.getElementById("decs").innerHTML=ds.map(([k,l])=>
    `<button class="${decade===k?'on':''}" onclick="setDec('${k}')">${l}</button>`).join("");
}
window.setDec=k=>{decade=k;renderDecs();renderList();};
window.onSearch=v=>{query=v.trim().toLowerCase();renderList();};
function matchQuery(f){
  if(!query)return true;
  if((f.c+" "+f.r).toLowerCase().includes(query))return true;
  return f.g.some(x=>(x.a+" "+x.h).toLowerCase().includes(query));
}
function inDecade(f){return decade==="all"||Math.floor(f.y/10)*10===+decade;}

function gameRow(f,x){
  const on=isOn(f.y,x.n);
  const awin=on&&x.w===x.a, hwin=on&&x.w===x.h;
  return `<div class="game ${on?'on':''}" onclick="tog(${f.y},${x.n})">
    <div class="gtok">${on?'&#9733;':'+'}</div>
    <div class="gbody">
      <div class="ghead"><span class="gnum">Game ${x.n}</span><span class="gdate">${esc(x.d)}</span></div>
      <div class="line ${awin?'win':''}">${badge(x.a,"sm")}<span class="tm">${esc(x.a)}</span><span class="sc">${on?x.as:'&ndash;'}</span></div>
      <div class="line ${hwin?'win':''}">${badge(x.h,"sm")}<span class="tm">${esc(x.h)}</span><span class="sc">${on?x.hs:'&ndash;'}</span></div>
    </div>
  </div>`;
}
function mvpSprite(c,num,tier){
  var M=["................","......hhhh......",".....hhhhhh.....",".....hssssh.....",".....ssssss.....","......ssss......","....jjjjjjjj....","...sjjjjjjjjs...","...sjjjjjjjjs...","....jjjjjjjj.bb.","....jjjjjjjjbbbb","....ppppppppbbbb","....pppppppp.bb.","....pp....pp....","...ss......ss...","...ss......ss..."];
  var col={s:'#e7b58a',h:'#241a12',j:c,p:'#15151c',b:'#ff7a1f'},r='';
  for(var y=0;y<M.length;y++){for(var x=0;x<16;x++){var ch=M[y].charAt(x);if(col[ch])r+='<rect x="'+x+'" y="'+y+'" width="1" height="1" fill="'+col[ch]+'"/>';}}
  var t=num?'<text x="8" y="9.3" text-anchor="middle" font-family="VT323, monospace" font-size="5.6" font-weight="bold" fill="#ffffff" stroke="#0a0a12" stroke-width="0.4" paint-order="stroke">'+num+'</text>':'';
  return '<svg class="mvpsprite t'+(tier||'G')+'" viewBox="0 0 16 16" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">'+r+t+'</svg>';
}
function card(f){
  const done=finalsDone(f), open=!!expanded[f.y];
  const seen=f.g.filter(x=>isOn(f.y,x.n)).length, len=f.g.length;
  const t1=f.g[0].a, t2=f.g[0].h;
  const col=t=>(TEAM[t]||{}).bg||'#3a3550';
  const c1=done?'#e8c14a':col(t1), c2=done?'#8a6614':col(t2);
  const pips=f.g.map(x=>`<span class="pip ${isOn(f.y,x.n)?'lit':''}"></span>`).join("");
  const m=f.rmvp;
  const sc=m?`<div class="tsc"><div class="tscbody"><div class="lbl">Regular Season MVP</div><div class="nm" style="font-size:${m.p.length<=12?11:m.p.length<=16?10:m.p.length<=19?9:m.p.length<=23?8:7}px">${esc(m.p)}</div><div class="mvpstats">${m.ppg?`<span class="st"><b>${m.ppg}</b><i>PPG</i></span>`:''}${m.rpg?`<span class="st"><b>${m.rpg}</b><i>RPG</i></span>`:''}${m.apg?`<span class="st"><b>${m.apg}</b><i>APG</i></span>`:''}${m.spg?`<span class="st"><b>${m.spg}</b><i>SPG</i></span>`:''}${m.pm?`<span class="st"><b>${m.pm}</b><i>+/-</i></span>`:''}</div></div></div>`:'';
  const photo = done
    ? `<div class="tphoto champ"><span class="holo"></span><div class="tmatch">${badge(f.c,"big")}</div>${sc}<div class="crown">Champions</div></div>`
    : `<div class="tphoto"><span class="holo"></span><div class="tmatch">${badge(t1)}<span class="tvs">VS</span>${badge(t2)}</div>${sc}</div>`;
  const plate = done
    ? `<div class="tkicker">${f.y} World Champions</div><div class="tyear champ">${esc(f.c)}</div><div class="tnames">def. ${esc(f.r)} &middot; <b>${f.s}</b></div>`
    : `<div class="tkicker">NBA Finals</div><div class="tyear">${f.y}</div><div class="tnames">${esc(t1)} vs ${esc(t2)}</div>`;
  const status = done
    ? `<span class="tstatus champ">&#9733; Champions</span>`
    : `<span class="tstatus">${seen}/${len} logged</span>`;
  return `<div class="card ${done?'done':''} ${open?'open':''}" style="--c1:${c1};--c2:${c2}">
    <div class="chead" onclick="exp(${f.y})">
      ${photo}
      <div class="tplate">${plate}</div>
      <div class="tfoot"><div class="meter">${pips}</div>${status}</div>
      <div class="thint">${open?'Tap to close':(done?'Tap for game log':'Tap to log games')}</div>
    </div>
    <div class="games"><div class="gltitle">Game Log</div>${done?`<button class="recapbtn" onclick="recap(${f.y})">View series recap</button>`:''}${f.g.map(x=>gameRow(f,x)).join("")}</div>
  </div>`;
}
function renderList(){
  const items=FINALS.filter(f=>inDecade(f)&&matchQuery(f));
  document.getElementById("list").innerHTML = items.length
    ? items.map(card).join("") : `<div class="empty">No Finals match that filter.</div>`;
}
function renderCase(){
  const done=FINALS.filter(finalsDone);
  document.getElementById("case").innerHTML = done.length
    ? `<div class="trophies">`+done.map(f=>
        `<div class="tro">${badge(f.c,"sm")}<div><div class="ty">${f.y}</div><div class="tc">${esc(f.c)}</div></div></div>`).join("")+`</div>`
    : `<div class="empty">Finish every game in a Finals to reveal the champion and raise the trophy.</div>`;
}
function renderAll(){renderScore();renderList();renderCase();}

window.exp=y=>{expanded[y]=!expanded[y];renderList();};
window.tog=(y,n)=>{
  const f=FINALS.find(z=>z.y===y);
  const wasDone=finalsDone(f);
  const k=gid(y,n);
  if(state.watched[k])delete state.watched[k]; else state.watched[k]=1;
  save();
  const nowDone=finalsDone(f);
  renderAll();
  if(!wasDone&&nowDone)recapModal(f,true);
};

function recapData(f){
  let cPts=0,oPts=0,best={m:-1},close={m:1e9};
  f.g.forEach(x=>{
    const cp=(f.c===x.h)?x.hs:x.as, op=(f.c===x.h)?x.as:x.hs;
    cPts+=cp; oPts+=op;
    const m=Math.abs(x.as-x.hs);
    if(m>best.m)best={m,x}; if(m<close.m)close={m,x};
  });
  const n=f.g.length, last=f.g[n-1];
  return {n,cAvg:(cPts/n).toFixed(1),oAvg:(oPts/n).toFixed(1),best,close,last,clinchHome:f.c===last.h};
}
function glogRow(f,x){
  const aw=x.w===x.a, hw=x.w===x.h;
  return `<div class="glog"><span class="gg">G${x.n}</span>`+
    `<span class="gt">${aw?'<b>'+esc(x.a)+'</b>':esc(x.a)} vs ${hw?'<b>'+esc(x.h)+'</b>':esc(x.h)}</span>`+
    `<span class="gv">${x.as}&ndash;${x.hs}</span></div>`;
}
function confetti(){
  const cols=["#ff6a1a","#ffc420","#e01e1e","#ff8c3a","#ffd23f"];
  let h="";
  for(let i=0;i<16;i++){
    const l=Math.random()*100, c=cols[i%cols.length], d=(Math.random()*2.6+1.4).toFixed(2), de=(Math.random()*1.2).toFixed(2);
    h+=`<span class="cfx" style="left:${l}%;background:${c};animation-duration:${d}s;animation-delay:${de}s"></span>`;
  }
  return `<div class="confetti">${h}</div>`;
}
function recapModal(f,boom){
  const d=recapData(f);
  const mvp=f.mvp?`<div class="rmvp"><div class="lbl">Finals MVP</div><div class="nm">${esc(f.mvp)}</div></div>`:"";
  const tiles=[
    ["Series",f.s],["Games",d.n],
    ["Champ PPG",d.cAvg],["Opp PPG",d.oAvg],
    ["Biggest win",`${d.best.m} <small>pts</small>`],["Closest game",`${d.close.m} <small>pts</small>`]
  ].map(([l,v])=>`<div class="rstat"><div class="lbl">${l}</div><div class="v">${v}</div></div>`).join("");
  const clinch=`<div class="rstat" style="flex-basis:100%"><div class="lbl">Clinched</div>`+
    `<div class="v">Game ${d.last.n} <small>${d.clinchHome?'at home':'on the road'}</small></div></div>`;
  const log=f.g.map(x=>glogRow(f,x)).join("");
  const header = boom
    ? `<div class="champword">Champions</div><div class="boomtag">&#9733; Boomshakalaka &#9733;</div>`
    : `<div class="champword small">Series Recap</div>`;
  document.getElementById("celmount").innerHTML=
   `<div class="cel" onclick="closeCel()">${boom?confetti():''}<div class="celbox win" onclick="event.stopPropagation()">
      ${header}
      <div class="rhead">${badge(f.c,"big")}
        <div><div class="celyr">${f.y}</div><div class="celc">${esc(f.c)}</div>
        <div class="cels"><b>def.</b> ${esc(f.r)} &middot; ${f.s}</div></div></div>
      ${mvp}
      <div class="rstats">${tiles}${clinch}</div>
      <div class="rlog"><div class="lbl">Game by game</div>${log}</div>
      <button class="celbtn" onclick="closeCel()">${boom?'KEEP BALLIN'+String.fromCharCode(39):'CLOSE'}</button>
    </div></div>`;
}
window.recap=(y)=>{const f=FINALS.find(z=>z.y===y); if(f&&finalsDone(f))recapModal(f,false);};
window.closeCel=()=>{document.getElementById("celmount").innerHTML="";};

function flash(m){const e=document.getElementById("dmsg");e.textContent=m;setTimeout(()=>{if(e.textContent===m)e.textContent="";},2800);}
window.doExport=async()=>{
  const payload=JSON.stringify({watched:state.watched},null,2);
  const fname="finalsjam-backup-"+new Date().toISOString().slice(0,10)+".json";
  try{const file=new File([payload],fname,{type:"application/json"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:"Finals Jam backup"});return;}
  }catch(e){return;}
  const blob=new Blob([payload],{type:"application/json"});const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=fname;document.body.appendChild(a);a.click();
  document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);
};
window.onImport=ev=>{
  const f=ev.target.files&&ev.target.files[0]; ev.target.value="";
  if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const o=JSON.parse(r.result);
    if(!o||typeof o.watched!=="object"){flash("Not a valid backup");return;}
    state.watched=o.watched;save();renderAll();flash("Backup restored");
  }catch(e){flash("Could not read that file");}};
  r.onerror=()=>flash("Could not read that file");
  r.readAsText(f);
};
window.onClear=()=>{
  const b=document.getElementById("clr");
  if(clearStep===0){clearStep=1;b.className="arm";b.textContent="Are you sure?";}
  else if(clearStep===1){clearStep=2;b.className="dang";b.textContent="Really really sure? No way back";}
  else{state={watched:{}};save();expanded={};clearStep=0;b.className="";b.textContent="Clear everything";renderAll();return;}
  clearTimeout(clearTimer);
  clearTimer=setTimeout(()=>{clearStep=0;b.className="";b.textContent="Clear everything";},3500);
};

renderScore();renderDecs();renderList();renderCase();
</script>
</body>
</html>
